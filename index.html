<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowdokku - Menú Principal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .menu-contenedor {
            background-color: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .menu-contenedor p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }

        /* Estilos de los botones del menú */
        .btn-menu {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: transform 0.2s, filter 0.2s;
            box-sizing: border-box;
        }

        .btn-menu:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .btn-clasico { background-color: #ff9f43; } /* Naranja */
        .btn-tematico { background-color: #007BFF; } /* Azul */
        
        .icono-texto {
            height: 1.1em;
            vertical-align: middle;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <h1><img src="sprite8.png" class="icono-texto" alt="Sprite" onerror="this.style.display='none'"> Meowdokku</h1>
    
    <div class="menu-contenedor">
        <h2>Menú Principal</h2>
        <p>Elige tu modo de juego:</p>

        <a href="clasico.html" class="btn-menu btn-clasico">🐱 Modo Clásico</a>
        
        <a href="sprite.html" class="btn-menu btn-tematico">⭐ Modo Sprites</a>
    </div>

</body>
</html>
