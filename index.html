<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowdokku - Menú Principal</title>
    <style>
        /* Variables de color para los dos modos */
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --container-bg: #fff;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-color: #1a1a1b;
            --text-color: #e0e0e0;
            --container-bg: #2d2d2e;
            --shadow: rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Botón Modo Nocturno flotando arriba a la derecha */
        #btn-mode {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid var(--text-color);
            background: transparent;
            color: var(--text-color);
            font-weight: bold;
            transition: all 0.3s;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .menu-contenedor {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px var(--shadow);
            text-align: center;
            width: 90%;
            max-width: 400px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .menu-contenedor p {
            font-size: 1.1rem;
            color: var(--text-color);
            opacity: 0.8; /* Un poco más suave que el título */
            margin-bottom: 30px;
        }

        .btn-menu {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: transform 0.2s, filter 0.2s;
            box-sizing: border-box;
        }

        .btn-menu:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .btn-clasico { background-color: #ff9f43; } 
        .btn-tematico { background-color: #007BFF; } 
        
        .icono-texto {
            height: 1.2em;
            vertical-align: middle;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <button id="btn-mode" onclick="toggleDarkMode()">🌙 Modo</button>

    <h1>🐱 Meowdokku</h1>
    
    <div class="menu-contenedor">
        <h2>Menú Principal</h2>
        <p>Elige tu modo de juego:</p>

        <a href="clasico.html" class="btn-menu btn-clasico">🐱 Modo Clásico</a>
        
        <a href="sprite.html" class="btn-menu btn-tematico">
            <img src="sprite8.png" class="icono-texto" alt="Sprite"> Modo Sprites
        </a>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('btn-mode');
            btn.innerText = document.body.classList.contains('dark-mode') ? "☀️ Modo" : "🌙 Modo";
        }
    </script>

</body>
</html>
